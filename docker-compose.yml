services:
  postgres:
    image: postgres:15-alpine
    container_name: hotel-postgres
    environment:
      POSTGRES_DB: hotel
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "123456"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hotel"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: hotel-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotel-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      DB_URL: jdbc:postgresql://postgres:5432/hotel
      DB_USERNAME: admin
      DB_PASSWORD: "123456"
      MONGODB_URI: mongodb://mongo:27017/hotel
      CORS_ALLOWED_ORIGINS: http://localhost:8081,http://localhost:5173
      VNPAY_RETURN_URL: http://localhost:8081/customer/booking/result
      VERIFY_EMAIL_BASE_URL: http://localhost:8081/verify-email
      RESET_PASSWORD_BASE_URL: http://localhost:8081/reset-password
      JWT_SECRET: cGxlYXNlLWNoYW5nZS1tZS1pbi1lbnYtc2VjcmV0LWRlbW8tMjAyNg==
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hotel-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:
