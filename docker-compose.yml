services:
  mongo:
    image: mongo:7
    container_name: hotel-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: hotel-postgres
    environment:
      POSTGRES_DB: hotel
      POSTGRES_USER: hotel
      POSTGRES_PASSWORD: hotel
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel -d hotel"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotel-backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: ${SERVER_PORT:-5000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173}
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/hotel}
      DB_USERNAME: ${DB_USERNAME:-hotel}
      DB_PASSWORD: ${DB_PASSWORD:-hotel}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/hotel}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-hotel}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      RESET_PASSWORD_BASE_URL: ${RESET_PASSWORD_BASE_URL:-http://localhost/reset-password}
      VERIFY_EMAIL_BASE_URL: ${VERIFY_EMAIL_BASE_URL:-http://localhost/verify-email}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL:-http://localhost/payment/vnpay-return}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:-DEMO}
      VNPAY_PAY_URL: ${VNPAY_PAY_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET:-dev-secret-change-me}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_API_TIMEOUT_MS: 10000
        VITE_API_RETRY_COUNT: 1
        VITE_API_RETRY_DELAY_MS: 300
    container_name: hotel-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres-data:
  mongo-data:
