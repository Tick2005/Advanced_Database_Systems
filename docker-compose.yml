services:
  mongo:
    image: mongo:7
    container_name: hotel-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
      - ./backend/src/main/resources/db/mongodb/init-hotel.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: hotel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotel
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d hotel"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotel-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SERVER_PORT: ${SERVER_PORT}
      CORS_ALLOWED_ORIGINS: https://${DOMAIN}
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DATABASE: ${MONGODB_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      RESET_PASSWORD_BASE_URL: ${RESET_PASSWORD_BASE_URL}
      VERIFY_EMAIL_BASE_URL: ${VERIFY_EMAIL_BASE_URL}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE}
      VNPAY_PAY_URL: ${VNPAY_PAY_URL}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

  # Builder-only: compiles React → /app/dist
  # nginx gateway will copy files from this image's named volume
  frontend-builder:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_API_TIMEOUT_MS: 10000
        VITE_API_RETRY_COUNT: 1
        VITE_API_RETRY_DELAY_MS: 300
    container_name: hotel-frontend-builder
    # copy dist to shared volume then exit
    command: sh -c "cp -r /app/dist/. /dist-out/ && echo 'Frontend build copied.'"
    volumes:
      - frontend-dist:/dist-out

  nginx:
    image: nginx:1.27-alpine
    container_name: hotel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx-local.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_started
      frontend-builder:
        condition: service_completed_successfully

volumes:
  postgres-data:
  mongo-data:
  frontend-dist: