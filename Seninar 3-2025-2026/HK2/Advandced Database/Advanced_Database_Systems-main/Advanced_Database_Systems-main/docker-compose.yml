services:
  postgres:
    image: postgres:15-alpine
    container_name: hotel-postgres
    environment:
      POSTGRES_DB: hotel
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "123456"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/migration:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hotel"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: hotel-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./backend/src/main/resources/db/mongodb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotel-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      DB_URL: jdbc:postgresql://postgres:5432/hotel
      DB_USERNAME: admin
      DB_PASSWORD: "123456"
      MONGODB_URI: mongodb://mongo:27017/hotel
      VERIFY_EMAIL_BASE_URL: ${VERIFY_EMAIL_BASE_URL:-http://localhost:8081/verify-email}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL:-http://localhost:8081/payment/vnpay-return}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:-DEMOV210}
      VNPAY_PAY_URL: ${VNPAY_PAY_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET:-vnpay-demo-secret}
      # các biến khác giữ nguyên
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hotel-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    container_name: hotel-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8082:80"
    volumes:
      # mount file servers.json từ thư mục hiện tại (cùng cấp với docker-compose.yml)
      - ./servers.json:/pgadmin4/servers.json
    depends_on:
      - postgres


  mongo-express:
    image: mongo-express
    container_name: hotel-mongo-express
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    ports:
      - "8083:8081"
    depends_on:
      mongo:
        condition: service_healthy   
    restart: always 

volumes:
  postgres_data:
  mongo_data:
