spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hotel}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/hotel}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:huynopro1801@gmail.com}
    password: ${MAIL_PASSWORD:usvprosykbigxwjk }
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
          timeout: ${MAIL_SMTP_TIMEOUT:5000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:5000}
    protocol: ${MAIL_PROTOCOL:smtp}
app:
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:huynopro1801@gmail.com}}
logging:
  level:
    root: INFO
    org.springframework: INFO


