server {
  listen 80;
  server_name _;

  # Let's Encrypt renewal (not used here since we use standalone mode, but good practice)
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  server_name _;

  ssl_certificate     /etc/letsencrypt/live/hotel/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/hotel/privkey.pem;

  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  # Serve React static files directly (from shared volume)
  root /usr/share/nginx/html;
  index index.html;

  # API proxy → Spring Boot backend
  location /api/ {
    proxy_pass         http://hotel-backend:5000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_read_timeout 60s;
  }

  # SPA fallback — all non-file routes go to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}