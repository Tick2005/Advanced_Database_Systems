resolver 127.0.0.11 valid=10s ipv6=off;

upstream backend_api {
  zone backend_api 64k;
  server backend:5000 resolve;
}

server {
  listen 80;
  server_name luxstay.phanvanduong.site localhost;

  # Serve React static files
  root /usr/share/nginx/html;
  index index.html;

  # NEVER cache index.html — Vite hashes JS/CSS filenames so HTML must always be fresh
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    try_files $uri /index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://backend_api/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Cache hashed static assets for 1 year (Vite adds content hash to filenames)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
