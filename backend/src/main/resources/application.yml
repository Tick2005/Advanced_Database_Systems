spring:
  application:
    name: hotel-backend
  jackson:
    time-zone: Asia/Ho_Chi_Minh
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hotel}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/hotel}
      database: ${MONGODB_DATABASE:hotel}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
          timeout: ${MAIL_SMTP_TIMEOUT:5000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:5000}
    protocol: ${MAIL_PROTOCOL:smtp}

server:
  port: ${SERVER_PORT:5000}
  forward-headers-strategy: framework

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  openapi:
    title: ${OPENAPI_TITLE:Hotel API}
    version: ${OPENAPI_VERSION:v1}
  security:
    jwt:
      secret: ${JWT_SECRET:please-change-me-in-env}
      access-token-expiration-minutes: ${JWT_ACCESS_MINUTES:30}
      refresh-token-expiration-days: ${JWT_REFRESH_DAYS:7}
  payment:
    vnpay:
      tmn-code: ${VNPAY_TMN_CODE:DEMOV210}
      pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      return-url: ${VNPAY_RETURN_URL:http://localhost:5173/payment/vnpay-return}
      hash-secret: ${VNPAY_HASH_SECRET:vnpay-demo-secret}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:huynopro1801@gmail.com}}
  auth:
    verify-email-base-url: ${VERIFY_EMAIL_BASE_URL:http://localhost:5173/verify-email}
    reset-password-base-url: ${RESET_PASSWORD_BASE_URL:http://localhost:5173/reset-password}
    reset-password-expire-minutes: ${RESET_PASSWORD_EXPIRE_MINUTES:15}
  booking:
    hold-minutes: ${BOOKING_HOLD_MINUTES:15}
  scheduler:
    booking-expire-ms: ${BOOKING_EXPIRE_SCHEDULER_MS:60000}
    pricing-refresh-ms: ${PRICING_REFRESH_SCHEDULER_MS:3600000}
    rating-sync-ms: ${RATING_SYNC_SCHEDULER_MS:300000}

logging:
  level:
    root: INFO
    org.springframework: WARN
    org.hibernate.SQL: WARN

