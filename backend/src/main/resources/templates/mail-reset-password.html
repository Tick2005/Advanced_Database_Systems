<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Reset password</title>
</head>
<body style="margin:0;padding:24px;background:#f6f8fb;font-family:Arial,sans-serif;color:#1f2937;">
	<table role="presentation" width="100%" cellspacing="0" cellpadding="0">
		<tr>
			<td align="center">
				<table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border-radius:12px;padding:24px;">
					<tr>
						<td>
							<h2 style="margin:0 0 12px 0;">Password reset request</h2>
							<p style="margin:0 0 16px 0;">Hi <strong>${fullName}</strong>,</p>
							<p style="margin:0 0 16px 0;">We received a request to reset your password. Click the button below to continue.</p>
							<p style="margin:0 0 24px 0;">
								<a href="${resetUrl}" style="display:inline-block;padding:12px 20px;background:#b45309;color:#ffffff;text-decoration:none;border-radius:8px;">Reset password</a>
							</p>
							<p style="margin:0;color:#6b7280;font-size:13px;">This link expires in ${expiresInMinutes} minutes.</p>
						</td>
					</tr>
				</table>
			</td>
		</tr>
	</table>
</body>
</html>
